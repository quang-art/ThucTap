{{- $url := .Destination -}}
{{- if and (strings.HasPrefix $url "/") (not (strings.HasPrefix $url "//")) -}}
  {{- $url = strings.TrimPrefix "/" $url | relURL -}}
{{- else -}}
  {{- $url = $url | relURL -}}
{{- end -}}
<img src="{{ $url }}" alt="{{ .Text }}" {{ with .Title }}title="{{ . }}"{{ end }} />
